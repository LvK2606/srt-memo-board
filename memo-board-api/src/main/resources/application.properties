spring.application.name=memo-board-api
# Thong tin ket noi MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/srt_memo_board?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
# Neu ban co cai mat khau cho MySQL thi dien vao dong duoi, neu dung XAMPP mac dinh thi cu de trong
spring.datasource.password=

# Hibernate / JPA config: Tu dong tao bang dua tren code Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Hien thi log SQL tren terminal de de kiem tra
spring.jpa.show-sql=true